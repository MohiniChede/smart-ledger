<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Mini-Ledger</title>
    
    <!-- React, ReactDOM, Babel (for JSX), and Axios via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body style="margin: 0; padding: 20px; font-family: Arial, sans-serif; background-color: #f9f9f9; color: #333;">

    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [transactions, setTransactions] = React.useState([]);
            const [description, setDescription] = React.useState('');
            const [amount, setAmount] = React.useState('');
            const [type, setType] = React.useState('INCOME');
            const [category, setCategory] = React.useState('Salary');

           const API_URL = '/api/transactions';

            // Fetch data from Java Backend
            const fetchTransactions = async () => {
                try {
                    const response = await axios.get(API_URL);
                    setTransactions(response.data);
                } catch (error) {
                    console.error("Error fetching transactions:", error);
                }
            };

            React.useEffect(() => {
                fetchTransactions();
            }, []);

            // Submit form to Java Backend
            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!description || !amount) {
                    alert("Please fill all fields");
                    return;
                }

                const newTransaction = {
                    description,
                    amount: parseFloat(amount),
                    type,
                    category
                };

                try {
                    await axios.post(API_URL, newTransaction);
                    setDescription('');
                    setAmount('');
                    fetchTransactions(); // Refresh UI list
                } catch (error) {
                    console.error("Error saving transaction:", error);
                }
            };

            // Calculations for Dashboard
            const totalIncome = transactions
                .filter(t => t.type === 'INCOME')
                .reduce((sum, t) => sum + t.amount, 0);

            const totalExpense = transactions
                .filter(t => t.type === 'EXPENSE')
                .reduce((sum, t) => sum + t.amount, 0);

            const netBalance = totalIncome - totalExpense;

            return (
                <div style={{ maxWidth: '800px', margin: '0 auto', padding: '20px', backgroundColor: 'white', borderRadius: '12px', boxShadow: '0 4px 6px rgba(0,0,0,0.1)' }}>
                    <h1 style={{ textAlign: 'center', color: '#2c3e50', marginBottom: '30px' }}>Smart Mini-Ledger</h1>
                    
                    {/* Metrics Dashboard */}
                    <div style={{ display: 'flex', gap: '20px', marginBottom: '30px' }}>
                        <div style={{ padding: '15px', border: '1px solid #d4edda', borderRadius: '8px', flex: 1, backgroundColor: '#d4edda', color: '#155724' }}>
                            <h3 style={{ margin: '0 0 10px 0' }}>Total Income</h3>
                            <p style={{ fontSize: '24px', fontWeight: 'bold', margin: 0 }}>INR {totalIncome}</p>
                        </div>
                        <div style={{ padding: '15px', border: '1px solid #f8d7da', borderRadius: '8px', flex: 1, backgroundColor: '#f8d7da', color: '#721c24' }}>
                            <h3 style={{ margin: '0 0 10px 0' }}>Total Expenses</h3>
                            <p style={{ fontSize: '24px', fontWeight: 'bold', margin: 0 }}>INR {totalExpense}</p>
                        </div>
                        <div style={{ padding: '15px', border: '1px solid #cce5ff', borderRadius: '8px', flex: 1, backgroundColor: '#cce5ff', color: '#004085' }}>
                            <h3 style={{ margin: '0 0 10px 0' }}>Net Balance</h3>
                            <p style={{ fontSize: '24px', fontWeight: 'bold', margin: 0 }}>INR {netBalance}</p>
                        </div>
                    </div>

                    {/* Form Component */}
                    <form onSubmit={handleSubmit} style={{ marginBottom: '40px', padding: '20px', border: '1px solid #e2e8f0', borderRadius: '8px', backgroundColor: '#f8fafc' }}>
                        <h3 style={{ marginTop: 0, color: '#475569' }}>Add New Transaction</h3>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '15px', marginBottom: '15px' }}>
                            <input 
                                type="text" 
                                placeholder="Description (e.g., Office Rent)" 
                                value={description} 
                                onChange={(e) => setDescription(e.target.value)}
                                style={{ padding: '10px', borderRadius: '4px', border: '1px solid #cbd5e1' }}
                            />
                            <input 
                                type="number" 
                                placeholder="Amount (INR)" 
                                value={amount} 
                                onChange={(e) => setAmount(e.target.value)}
                                style={{ padding: '10px', borderRadius: '4px', border: '1px solid #cbd5e1' }}
                            />
                            <select value={type} onChange={(e) => setType(e.target.value)} style={{ padding: '10px', borderRadius: '4px', border: '1px solid #cbd5e1' }}>
                                <option value="INCOME">Income</option>
                                <option value="EXPENSE">Expense</option>
                            </select>
                            <select value={category} onChange={(e) => setCategory(e.target.value)} style={{ padding: '10px', borderRadius: '4px', border: '1px solid #cbd5e1' }}>
                                <option value="Salary">Salary</option>
                                <option value="Food">Food</option>
                                <option value="Rent">Rent</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Utilities">Utilities</option>
                            </select>
                        </div>
                        <button type="submit" style={{ padding: '12px 24px', backgroundColor: '#3b82f6', color: 'white', border: 'none', borderRadius: '6px', cursor: 'pointer', fontWeight: 'bold', width: '100%' }}>
                            Save Transaction
                        </button>
                    </form>

                    {/* Table Logs */}
                    <h3 style={{ color: '#475569' }}>Transaction History</h3>
                    <table style={{ width: '100%', borderCollapse: 'collapse', marginTop: '10px' }}>
                        <thead>
                            <tr style={{ backgroundColor: '#f1f5f9', textAlign: 'left' }}>
                                <th style={{ padding: '12px', borderBottom: '2px solid #cbd5e1' }}>Description</th>
                                <th style={{ padding: '12px', borderBottom: '2px solid #cbd5e1' }}>Category</th>
                                <th style={{ padding: '12px', borderBottom: '2px solid #cbd5e1' }}>Type</th>
                                <th style={{ padding: '12px', borderBottom: '2px solid #cbd5e1' }}>Amount</th>
                            </tr>
                        </thead>
                        <tbody>
                            {transactions.map((t) => (
                                <tr key={t.id} style={{ borderBottom: '1px solid #e2e8f0' }}>
                                    <td style={{ padding: '12px' }}>{t.description}</td>
                                    <td style={{ padding: '12px' }}><span style={{ backgroundColor: '#e2e8f0', padding: '4px 8px', borderRadius: '4px', fontSize: '13px' }}>{t.category}</span></td>
                                    <td style={{ padding: '12px', color: t.type === 'INCOME' ? '#16a34a' : '#dc2626', fontWeight: 'bold' }}>
                                        {t.type}
                                    </td>
                                    <td style={{ padding: '12px', fontWeight: 'bold' }}>INR {t.amount}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }

        const root = tragedies = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
